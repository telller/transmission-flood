version: "3.8"

services:
  flood:
    image: jesec/flood:latest
    container_name: flood
    restart: unless-stopped

    ports:
      - "8000:3000"

    environment:
      - HOME=/config
      - FLOOD_OPTION_host=0.0.0.0
      - FLOOD_OPTION_port=3000
      - FLOOD_OPTION_allowedPaths=["/data"]

      # flood login
      - FLOOD_OPTION_username=${FLOOD_USER}
      - FLOOD_OPTION_password=${FLOOD_PASS}

      # transmission
      - FLOOD_OPTION_transmission_host=172.17.0.1
      - FLOOD_OPTION_transmission_port=9091
      - FLOOD_OPTION_transmission_username=${TR_USER}
      - FLOOD_OPTION_transmission_password=${TR_PASS}

    volumes:
      - flood-data:/config
      - /home/teller/media/films:/data

    user: "0:0"

volumes:
  flood-data: